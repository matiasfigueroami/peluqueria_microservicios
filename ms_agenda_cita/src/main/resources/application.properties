spring.application.name=ms_agenda_cita
server.port=8083

spring.datasource.url=jdbc:mysql://localhost:3306/ms_agenda_cita
spring.datasource.username=root
spring.datasource.password=


spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Forzar el uso del cliente moderno compatible con Spring Boot 4
eureka.client.eureka-server-http-client-name=RestClient

# Permitir registrarse y buscar a otros compaÒeros en el servidor
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# URL exacta de tu ms-eureka levantado en el paso anterior
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Exponer los endpoints de info y health a travÈs de la web
management.endpoints.web.exposure.include=health,info

# (Opcional) Permitir que el endpoint de 'info' muestre datos personalizados si los pones
management.info.env.enabled=true

info.app.name=MS Peluqueria: Agenda Cita